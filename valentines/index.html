<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quer namorar comigo? ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
}

.container{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#e91e63;
    margin-bottom:30px;
    font-size:2.5rem;
}

.buttons{
    position:relative;
    width:400px;
    height:150px;
    margin:auto;
}

button{
    border:none;
    padding:15px 30px;
    font-size:1.2rem;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

#sim{
    background:#4CAF50;
    color:white;
}

#sim:hover{
    transform:scale(1.1);
}

#nao{
    background:#f44336;
    color:white;
    position:absolute;
    left:220px;
    top:0;
}
</style>
</head>
<body>

<div class="container">
    <h1>💖 Quer namorar comigo? 💖</h1>

    <div class="buttons">
        <button id="sim">Sim ❤️</button>
        <button id="nao">Não 😢</button>
    </div>
</div>

<script>
// Botão NÃO foge
const btnNao = document.getElementById("nao");

btnNao.addEventListener("mouseover", () => {
    const maxX = window.innerWidth - btnNao.offsetWidth - 20;
    const maxY = window.innerHeight - btnNao.offsetHeight - 20;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    btnNao.style.position = "fixed";
    btnNao.style.left = randomX + "px";
    btnNao.style.top = randomY + "px";
});

// Botão SIM
document.getElementById("sim").addEventListener("click", () => {

    document.body.innerHTML = `
    <div class="amor-container">
        <div class="mensagens" id="mensagens"></div>

        <h1>❤️ EBAAAA! ❤️</h1>
        <h2>Eu sabia que você ia aceitar! 🥰</h2>
        <h3>.</h3>

        <div class="heart"></div>
    </div>

    <style>

        body{
            margin:0;
            overflow:hidden;
        }

        .amor-container{
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#ff758c,#ff7eb3);
            position:relative;
            overflow:hidden;
        }

        .amor-container h1{
            color:white;
            font-size:3rem;
            z-index:10;
            margin-bottom:10px;
        }

        .amor-container h2{
            color:white;
            z-index:10;
            margin-bottom:40px;
        }

        .heart{
            position:relative;
            width:150px;
            height:150px;
            background:red;
            transform:rotate(-45deg);
            animation:pulse 1s infinite;
            z-index:10;
        }

        .heart::before,
        .heart::after{
            content:'';
            position:absolute;
            width:150px;
            height:150px;
            background:red;
            border-radius:50%;
        }

        .heart::before{
            top:-75px;
            left:0;
        }

        .heart::after{
            left:75px;
            top:0;
        }

        @keyframes pulse{
            0%{
                transform:rotate(-45deg) scale(1);
            }
            50%{
                transform:rotate(-45deg) scale(1.2);
            }
            100%{
                transform:rotate(-45deg) scale(1);
            }
        }

        .eu-te-amo{
            position:absolute;
            color:rgba(255,255,255,0.30);
            font-weight:bold;
            white-space:nowrap;
            pointer-events:none;
            animation:flutuar linear infinite;
        }

        @keyframes flutuar{
            from{
                transform:translateY(120vh);
            }
            to{
                transform:translateY(-120vh);
            }
        }
    </style>
    `;

    const mensagens = document.getElementById("mensagens");

    for(let i = 0; i < 70; i++){
        const texto = document.createElement("div");

        texto.classList.add("eu-te-amo");
        texto.innerHTML = "❤️ Eu te amo ❤️";

        texto.style.left = Math.random() * 100 + "vw";
        texto.style.top = Math.random() * 100 + "vh";
        texto.style.fontSize = (16 + Math.random() * 30) + "px";
        texto.style.animationDuration = (6 + Math.random() * 10) + "s";
        texto.style.animationDelay = Math.random() * 5 + "s";

        mensagens.appendChild(texto);
    }
});
</script>

</body>
</html>
